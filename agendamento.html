<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendamento Psicológico — App Inatel</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="agendamento.css">
</head>
<body>

  <header id="head_agendamento">
    <div id="back_btn" onclick="window.location.href='index.html'">
      <span class="material-symbols-outlined icoG">arrow_back</span>
    </div>
    <div id="head_agendamento_title">Agendamento Psicológico</div>
  </header>

  <main>
    <div class="container">
      <div class="section-label">Psicóloga</div>
      <div class="psico-row">
        <div class="psico-avatar">LS</div>
        <div>
          <div class="psico-name">Ludimila Rocha da Silveira</div>
          <div class="psico-email">ludimila@inatel.br</div>
        </div>
      </div>
      <button class="btn_agendar" style="margin-bottom:0" onclick="verHorarios()">VER HORÁRIOS</button>
    </div>

    <div class="container">
      <div class="section-label" id="mesAnoLabel">Selecionar Data</div>
      <div class="calendar-weekdays">
        <div class="weekday-label">D</div>
        <div class="weekday-label">S</div>
        <div class="weekday-label">T</div>
        <div class="weekday-label">Q</div>
        <div class="weekday-label">Q</div>
        <div class="weekday-label">S</div>
        <div class="weekday-label">S</div>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="container">
      <div class="section-label">Horários Disponíveis</div>
      <div class="times-grid" id="timesGrid"></div>
    </div>

    <div class="btn-confirmar-wrapper">
      <button class="btn_agendar" onclick="confirmarConsulta()">CONFIRMAR CONSULTA</button>
    </div>
  </main>

  <script src="notificacao.js"></script>
  <script src="agendamento.js"></script>
</body>
</html>
